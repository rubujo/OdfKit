name: Setup .NET for OdfKit
description: 設定 SDK、關閉遙測，並快取工作區 NuGet 套件目錄以減少 CI 還原耗時。
inputs:
  dotnet-versions:
    description: setup-dotnet 的 dotnet-version（支援多行）
    required: false
    default: 10.0.x
  cache-key-suffix:
    description: 快取鍵額外後綴（區分不同 job）
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Configure .NET environment
      shell: pwsh
      run: |
        "DOTNET_NOLOGO=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "DOTNET_CLI_TELEMETRY_OPTOUT=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "NUGET_PACKAGES=$($env:GITHUB_WORKSPACE)/.nuget/packages" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        New-Item -ItemType Directory -Path "$($env:GITHUB_WORKSPACE)/.nuget/packages" -Force | Out-Null

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/eng/OdfKit.Package.props', '**/Directory.Packages.props') }}${{ inputs.cache-key-suffix }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-versions }}