name: ODF corpus

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-corpus:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate ODF corpus
        shell: pwsh
        run: ./eng/Test-OdfCorpus.ps1
