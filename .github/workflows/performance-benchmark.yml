name: Performance benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-regression:
    name: Benchmark Regression
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-odfkit
        with:
          dotnet-versions: |
            10.0.x
          cache-key-suffix: '-perf-benchmark'

      - name: Run benchmark regression
        shell: pwsh
        run: ./eng/Benchmark-Regression.ps1 -Configuration Release