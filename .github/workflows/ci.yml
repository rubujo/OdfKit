name: CI Build & Test

on:
  push:
    branches:
      - main
    paths:
      - 'OdfKit/**'
      - 'OdfKit.Extensions.*/**'
      - 'OdfKit.Tests/**'
      - 'eng/**'
      - 'docs/ci-cd.md'
      - '.github/actions/setup-dotnet-odfkit/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'OdfKit/**'
      - 'OdfKit.Extensions.*/**'
      - 'OdfKit.Tests/**'
      - 'eng/**'
      - 'docs/ci-cd.md'
      - '.github/actions/setup-dotnet-odfkit/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & Test (${{ matrix.os }} - ${{ matrix.framework }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        framework: [net8.0, net10.0]
    timeout-minutes: 15
    env:
      TEST_RESULTS_DIR: artifacts/test-results/${{ matrix.os }}-${{ matrix.framework }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-odfkit
        with:
          dotnet-versions: |
            10.0.x
            8.0.x
          cache-key-suffix: '-ci-test'

      - name: Build test project
        shell: pwsh
        timeout-minutes: 6
        run: |
          dotnet build OdfKit.Tests/OdfKit.Tests.csproj -c Release -f ${{ matrix.framework }}

      - name: Run smoke tests (docs)
        shell: pwsh
        timeout-minutes: 4
        run: |
          $testFilter = 'Category=Smoke&FullyQualifiedName~DocsAndCorpusContractTests'
          $resultsDir = Join-Path $env:TEST_RESULTS_DIR 'docs'
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          Write-Host "CI 快速回歸測試 filter: $testFilter"
          dotnet test OdfKit.Tests/OdfKit.Tests.csproj `
            -c Release `
            -f ${{ matrix.framework }} `
            --no-build `
            --filter $testFilter `
            --results-directory $resultsDir `
            --logger "console;verbosity=normal" `
            --blame-hang `
            --blame-hang-timeout 3m `
            --blame-hang-dump-type none `
            --logger "trx;LogFileName=smoke-docs-${{ matrix.os }}-${{ matrix.framework }}.trx"

      - name: Run smoke tests (api)
        shell: pwsh
        timeout-minutes: 5
        run: |
          $testFilter = 'Category=Smoke&(FullyQualifiedName~ApiUsabilityTests|FullyQualifiedName~DocumentKindApiUsabilityTests|FullyQualifiedName~TextApiUsabilityTests|FullyQualifiedName~SpreadsheetApiUsabilityTests|FullyQualifiedName~PresentationApiUsabilityTests|FullyQualifiedName~DrawingApiUsabilityTests)'
          $resultsDir = Join-Path $env:TEST_RESULTS_DIR 'api'
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          Write-Host "CI 快速回歸測試 filter: $testFilter"
          dotnet test OdfKit.Tests/OdfKit.Tests.csproj `
            -c Release `
            -f ${{ matrix.framework }} `
            --no-build `
            --filter $testFilter `
            --results-directory $resultsDir `
            --logger "console;verbosity=normal" `
            --blame-hang `
            --blame-hang-timeout 3m `
            --blame-hang-dump-type none `
            --logger "trx;LogFileName=smoke-api-${{ matrix.os }}-${{ matrix.framework }}.trx"

      - name: Run smoke tests (package-entries)
        shell: pwsh
        timeout-minutes: 4
        run: |
          $testFilter = 'Category=Smoke&(FullyQualifiedName~OdfPackage|FullyQualifiedName~PackageReadinessTests)'
          $resultsDir = Join-Path $env:TEST_RESULTS_DIR 'package-entries'
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          Write-Host "CI 快速回歸測試 filter: $testFilter"
          dotnet test OdfKit.Tests/OdfKit.Tests.csproj `
            -c Release `
            -f ${{ matrix.framework }} `
            --no-build `
            --filter $testFilter `
            --results-directory $resultsDir `
            --logger "console;verbosity=normal" `
            --blame-hang `
            --blame-hang-timeout 3m `
            --blame-hang-dump-type none `
            --logger "trx;LogFileName=smoke-package-entries-${{ matrix.os }}-${{ matrix.framework }}.trx"

      - name: Run smoke tests (package-roundtrip)
        shell: pwsh
        timeout-minutes: 5
        run: |
          $testFilter = 'Category=Smoke&FullyQualifiedName~PackageRoundTripTests'
          $resultsDir = Join-Path $env:TEST_RESULTS_DIR 'package-roundtrip'
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          Write-Host "CI 快速回歸測試 filter: $testFilter"
          dotnet test OdfKit.Tests/OdfKit.Tests.csproj `
            -c Release `
            -f ${{ matrix.framework }} `
            --no-build `
            --filter $testFilter `
            --results-directory $resultsDir `
            --logger "console;verbosity=normal" `
            --blame-hang `
            --blame-hang-timeout 3m `
            --blame-hang-dump-type none `
            --logger "trx;LogFileName=smoke-package-roundtrip-${{ matrix.os }}-${{ matrix.framework }}.trx"

      - name: Run smoke tests (vertical-slice)
        shell: pwsh
        timeout-minutes: 4
        run: |
          $testFilter = 'Category=Smoke&FullyQualifiedName~VerticalSliceRoundTripTests'
          $resultsDir = Join-Path $env:TEST_RESULTS_DIR 'vertical-slice'
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          Write-Host "CI 快速回歸測試 filter: $testFilter"
          dotnet test OdfKit.Tests/OdfKit.Tests.csproj `
            -c Release `
            -f ${{ matrix.framework }} `
            --no-build `
            --filter $testFilter `
            --results-directory $resultsDir `
            --logger "console;verbosity=normal" `
            --blame-hang `
            --blame-hang-timeout 3m `
            --blame-hang-dump-type none `
            --logger "trx;LogFileName=smoke-vertical-slice-${{ matrix.os }}-${{ matrix.framework }}.trx"

      - name: Run smoke tests (core-security)
        shell: pwsh
        timeout-minutes: 5
        run: |
          $testFilter = 'Category=Smoke&(FullyQualifiedName~OdfCoreRegressionTests|FullyQualifiedName~OdfBoundaryRegressionTests|FullyQualifiedName~OdfSecurityBoundaryTests|FullyQualifiedName~SecurityBoundaryTests)'
          $resultsDir = Join-Path $env:TEST_RESULTS_DIR 'core-security'
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          Write-Host "CI 快速回歸測試 filter: $testFilter"
          dotnet test OdfKit.Tests/OdfKit.Tests.csproj `
            -c Release `
            -f ${{ matrix.framework }} `
            --no-build `
            --filter $testFilter `
            --results-directory $resultsDir `
            --logger "console;verbosity=normal" `
            --blame-hang `
            --blame-hang-timeout 3m `
            --blame-hang-dump-type none `
            --logger "trx;LogFileName=smoke-core-security-${{ matrix.os }}-${{ matrix.framework }}.trx"

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.framework }}
          path: artifacts/test-results/${{ matrix.os }}-${{ matrix.framework }}/
          if-no-files-found: ignore
          retention-days: 7
