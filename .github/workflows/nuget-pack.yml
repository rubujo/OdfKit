name: NuGet pack

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-nuget-pack:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate NuGet pack structure and consumer smoke
        shell: pwsh
        run: ./eng/Test-NuGetPack.ps1 -Configuration Release