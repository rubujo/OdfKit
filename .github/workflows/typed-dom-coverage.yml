name: Typed DOM coverage

on:
  pull_request:
    paths:
      - 'OdfKit/**'
      - 'tools/OdfKit.Cli/**'
      - 'tools/OdfSchemaGenerator/**'
      - 'eng/Test-OdfTypedDomCoverage.ps1'
      - '.github/actions/setup-dotnet-odfkit/**'
      - '.github/workflows/typed-dom-coverage.yml'
  push:
    branches:
      - main
    paths:
      - 'OdfKit/**'
      - 'tools/OdfKit.Cli/**'
      - 'tools/OdfSchemaGenerator/**'
      - 'eng/Test-OdfTypedDomCoverage.ps1'
      - '.github/actions/setup-dotnet-odfkit/**'
      - '.github/workflows/typed-dom-coverage.yml'
  workflow_dispatch:

concurrency:
  group: typed-dom-coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  typed-dom-coverage:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-odfkit

      - name: Generate typed DOM coverage
        shell: pwsh
        run: ./eng/Test-OdfTypedDomCoverage.ps1

      - name: Upload typed DOM coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: odf-typed-dom-coverage
          path: artifacts/typed-dom-coverage/odf-typed-dom-coverage.json
          retention-days: 14
