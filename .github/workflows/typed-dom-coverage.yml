name: Typed DOM coverage

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  typed-dom-coverage:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Generate typed DOM coverage
        shell: pwsh
        run: ./eng/Test-OdfTypedDomCoverage.ps1

      - name: Upload typed DOM coverage
        uses: actions/upload-artifact@v4
        with:
          name: odf-typed-dom-coverage
          path: artifacts/typed-dom-coverage/odf-typed-dom-coverage.json
